name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleFdroidRelease

    - name: Verify No Tracking Libraries
      run: |
        echo "Checking for tracking libraries..."
        if unzip -l app/build/outputs/apk/fdroid/release/*.apk | grep -iE "(firebase|analytics|crashlytics)"; then
          echo "❌ Found tracking libraries!"
          exit 1
        fi
        echo "✅ No tracking libraries found"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/fdroid/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
