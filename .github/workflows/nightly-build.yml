name: Nightly Build

on:
  schedule:
    # 每天 UTC 时间 02:00 运行
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NDK_VERSION: '25.2.9519653'

jobs:
  nightly-build:
    name: Nightly Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get short SHA
      id: slug
      run: echo "sha7=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Nightly APK
      run: |
        ./gradlew assembleDebug
        mv app/build/outputs/apk/debug/app-debug.apk \
           app/build/outputs/apk/debug/cclaude-nightly-${{ steps.slug.outputs.sha7 }}.apk

    - name: Upload Nightly Build
      uses: actions/upload-artifact@v4
      with:
        name: cclaude-nightly-${{ steps.slug.outputs.sha7 }}
        path: app/build/outputs/apk/debug/cclaude-nightly-*.apk
        retention-days: 7

    - name: Delete old artifacts
      uses: geekyeggo/delete-artifact@v4
      with:
        name: |
          cclaude-nightly-*
        failOnError: false
      continue-on-error: true
