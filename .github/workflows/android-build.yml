name: Android CI Build

on:
  push:
    branches: [ main, develop, 'release/*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_SDK_TOOLS: '9477386'
  NDK_VERSION: '25.2.9519653'
  CMAKE_VERSION: '3.22.1'

jobs:
  # ========== 1. 代码质量检查 ==========
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run ktlint check
      run: ./gradlew ktlintCheck --continue || true

    - name: Run lint
      run: ./gradlew lintDebug --continue || true

  # ========== 2. 构建 JNI 库 ==========
  build-jni:
    name: Build JNI Libraries
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
        include:
          - abi: arm64-v8a
            goarch: arm64
          - abi: armeabi-v7a
            goarch: arm
          - abi: x86_64
            goarch: amd64

    steps:
    - name: Checkout Android code
      uses: actions/checkout@v4
      with:
        path: android

    - name: Checkout CClaude core library
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/cclaude-core
        path: cclaude-core
      continue-on-error: true

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Build libcclaude.so
      run: |
        if [ -d "cclaude-core" ]; then
          cd cclaude-core
          mkdir -p build_android && cd build_android
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON
          
          make -j$(nproc)
          
          # Copy to Android project
          mkdir -p ../../android/app/src/main/jniLibs/${{ matrix.abi }}
          cp libcclaude.so ../../android/app/src/main/jniLibs/${{ matrix.abi }}/
        else
          echo "CClaude core not found, using prebuilt stub"
          mkdir -p android/app/src/main/jniLibs/${{ matrix.abi }}
          touch android/app/src/main/jniLibs/${{ matrix.abi }}/.keep
        fi

    - name: Upload JNI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jni-libs-${{ matrix.abi }}
        path: android/app/src/main/jniLibs/${{ matrix.abi }}/
        retention-days: 7

  # ========== 3. 构建 Android APK ==========
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-jni
    
    strategy:
      matrix:
        build-type: [debug, release]
        exclude:
          - build-type: ${{ github.event_name != 'release' && 'release' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses
      run: yes | sdkmanager --licenses || true

    - name: Install NDK
      run: sdkmanager "ndk;${{ env.NDK_VERSION }}" "cmake;${{ env.CMAKE_VERSION }}"

    - name: Download JNI artifacts
      uses: actions/download-artifact@v4
      with:
        path: app/src/main/jniLibs/
        merge-multiple: true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: |
        if [ "${{ matrix.build-type }}" == "release" ]; then
          ./gradlew assembleRelease
        else
          ./gradlew assembleDebug
        fi

    - name: Sign Release APK
      if: matrix.build-type == 'release'
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      continue-on-error: true

    - name: Upload Debug APK
      if: matrix.build-type == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: cclaude-android-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      if: matrix.build-type == 'release' && steps.sign_app.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: cclaude-android-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Upload AAB (App Bundle)
      if: matrix.build-type == 'release'
      run: ./gradlew bundleRelease
      continue-on-error: true

    - name: Upload AAB Artifact
      if: matrix.build-type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: cclaude-android-aab
        path: app/build/outputs/bundle/release/
        retention-days: 30

  # ========== 4. 创建 GitHub Release ==========
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: CClaude Android ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        body: |
          ## CClaude Android ${{ github.ref_name }}
          
          ### 下载
          - 📱 APK (Debug): `cclaude-android-debug`
          - 📦 APK (Release): `cclaude-android-release`
          - 🎁 AAB (Play Store): `cclaude-android-aab`
          
          ### 安装
          ```bash
          adb install cclaude-android-debug.apk
          ```
          
          ### 更新日志
          查看 [CHANGELOG.md](../CHANGELOG.md) 获取详细信息。

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./cclaude-android-debug/app-debug.apk
        asset_name: cclaude-${{ github.ref_name }}-debug.apk
        asset_content_type: application/vnd.android.package-archive
      continue-on-error: true

  # ========== 5. 构建报告 ==========
  build-report:
    name: Build Report
    runs-on: ubuntu-latest
    needs: [code-quality, build-jni, build-apk]
    if: always()
    
    steps:
    - name: Generate Build Report
      run: |
        echo "## 构建报告" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| 任务 | 状态 |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|" >> $GITHUB_STEP_SUMMARY
        echo "| 代码质量 | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| JNI 构建 | ${{ needs.build-jni.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| APK 构建 | ${{ needs.build-apk.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 触发信息" >> $GITHUB_STEP_SUMMARY
        echo "- 分支: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- 触发者: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
