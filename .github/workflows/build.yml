name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: Build arm64-v8a Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build F-Droid Release
        run: gradle assembleFdroidRelease --no-daemon --stacktrace

      - name: Locate APK
        run: |
          echo "=== APK Files ==="
          find app/build/outputs -type f -name "*.apk" -print
          APK_PATH=$(find app/build/outputs -type f -name "*release*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found"
            exit 1
          fi
          cp "$APK_PATH" app-arm64-v8a-release.apk
          ls -lh app-arm64-v8a-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: app-arm64-v8a-release.apk
          if-no-files-found: error
          retention-days: 7
