name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

    - name: Build Signed APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=keystore.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

    - name: Rename APK with Version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        cp app/build/outputs/apk/release/app-release.apk "CClaude-${VERSION}.apk"

    - name: Generate Checksums
      run: |
        sha256sum CClaude-*.apk > checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          CClaude-*.apk
          checksums.txt
        body: |
          ## CClaude Android ${{ github.ref_name }}
          
          ### Privacy-First AI Assistant
          
          #### What's New
          - Initial F-Droid release
          - Zero tracking libraries
          - Full offline capabilities
          - Material Design 3 UI
          
          #### Verification
          ```bash
          sha256sum -c checksums.txt
          ```
          
          #### F-Droid
          Available on F-Droid: https://f-droid.org/packages/com.cclaude.android
        draft: false
        prerelease: false

    - name: Upload to F-Droid
      run: |
        # Trigger F-Droid build (if configured)
        echo "F-Droid will auto-detect this release"
